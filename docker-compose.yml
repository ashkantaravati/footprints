services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: footprints
      MYSQL_USER: footprints
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports: ["3306:3306"]
    volumes: ["mysql:/var/lib/mysql"]
  php:
    image: php:8.3-cli
    working_dir: /app/backend
    volumes: [".:/app"]
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports: ["8000:8000"]
    depends_on: [mysql]
volumes: { mysql: {} }
